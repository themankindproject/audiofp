name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Jobs run in parallel unless they have explicit dependencies.
jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: unit and integration tests
        run: cargo test --all-features
      - name: doc tests
        run: cargo test --doc --all-features
      - name: doc build
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  property-tests:
    name: property tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: property-based tests (256 cases)
        run: cargo test --test property --all-features
        env:
          PROPTEST_CASES: 256

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: check (all features, MSRV)
        run: cargo check --all-features
      - name: test (MSRV)
        run: cargo test --all-features

  no-std:
    name: no_std build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: check no_std (default target)
        run: cargo check --no-default-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-deny
        run: cargo install cargo-deny --version 0.18.3 --locked
      - name: cargo deny check
        run: cargo deny check

  fuzz:
    name: fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-fuzz
        run: cargo +nightly install cargo-fuzz
      - name: fuzz smoke test (10 seconds)
        run: cargo +nightly fuzz run streaming_wang_equiv -- -max_total_time=10 -runs=1000
